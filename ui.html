<!DOCTYPE html>
<html>
<head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      color: #333;
      background: #fff;
      padding: 16px;
      overflow-y: auto;
    }

    h2 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #123D5C;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #555;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .field {
      margin-bottom: 14px;
    }

    textarea, input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      font-size: 12px;
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fafafa;
      transition: border-color 0.2s;
      outline: none;
    }

    textarea:focus, input[type="text"]:focus {
      border-color: #123D5C;
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 70px;
    }

    .metrics-group {
      display: flex;
      gap: 8px;
    }

    .metrics-group input {
      flex: 1;
    }

    .divider {
      height: 1px;
      background: #e5e5e5;
      margin: 16px 0;
    }

    .field-hint {
      font-size: 10px;
      color: #999;
      margin-top: 3px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #123D5C;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }

    button:hover {
      background: #0d2e45;
    }

    button:active {
      background: #092233;
    }
  </style>
</head>
<body>

  <h2>Briefing Generator</h2>

  <div class="field">
    <label>Test Name</label>
    <input type="text" id="testName" placeholder="GE|MENU|AB029 – Redesign Menu Adding Visual Cards" />
  </div>

  <div class="field">
    <label>Hypothesis</label>
    <textarea id="hypothesis" placeholder="If we redesign the mobile menu to include visual product cards..."></textarea>
  </div>

  <div class="divider"></div>

  <div class="field">
    <label>Identified Problems</label>
    <textarea id="identifiedProblems" placeholder="One problem per line. Bullets (•) are added automatically.&#10;&#10;The current menu is text-only...&#10;Users must rely on reading multiple pages..."></textarea>
    <div class="field-hint">List the problems this test aims to solve (one per line)</div>
  </div>

  <div class="field">
    <label>What We Propose</label>
    <textarea id="whatWePropose" placeholder="One proposal per line. Bullets (•) are added automatically.&#10;&#10;Redesign the mobile menu to include visual cards...&#10;Replace text-only links with image-based elements..."></textarea>
    <div class="field-hint">Describe the proposed changes (one per line)</div>
  </div>

  <div class="field">
    <label>Reasons Why</label>
    <textarea id="reasonsWhy" placeholder="Format: Title — Explanation (one per line)&#10;&#10;Recognition Heuristic — Users click faster when they see products visually&#10;Cognitive Load Reduction — Visual cards reduce effort"></textarea>
    <div class="field-hint">Behavioral/psychological reasons. Use "Title — Explanation" format, one per line</div>
  </div>

  <div class="divider"></div>

  <div class="field">
    <label>Measured by</label>
    <div class="metrics-group">
      <input type="text" id="metric1" placeholder="Metric 1" />
      <input type="text" id="metric2" placeholder="Metric 2" />
      <input type="text" id="metric3" placeholder="Metric 3" />
    </div>
    <div class="field-hint">The 3 KPIs used to evaluate this test</div>
  </div>

  <div class="field">
    <label>URL Rule</label>
    <input type="text" id="urlRule" placeholder="Menu (open the menu)" />
  </div>

  <div class="divider"></div>

  <button id="generateBtn">Generate Briefing</button>

  <script>
    document.getElementById('generateBtn').addEventListener('click', () => {
      const data = {
        testName: document.getElementById('testName').value.trim(),
        hypothesis: document.getElementById('hypothesis').value.trim(),
        identifiedProblems: document.getElementById('identifiedProblems').value.trim(),
        whatWePropose: document.getElementById('whatWePropose').value.trim(),
        reasonsWhy: document.getElementById('reasonsWhy').value.trim(),
        metric1: document.getElementById('metric1').value.trim(),
        metric2: document.getElementById('metric2').value.trim(),
        metric3: document.getElementById('metric3').value.trim(),
        urlRule: document.getElementById('urlRule').value.trim()
      };

      // Validate required fields
      if (!data.testName || !data.hypothesis) {
        alert('Please fill in at least the Test Name and Hypothesis.');
        return;
      }

      parent.postMessage({ pluginMessage: { type: 'generate', data: data } }, '*');
    });
  </script>

</body>
</html>
